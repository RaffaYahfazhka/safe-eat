<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo.png">
<title>Profile - Safe-eat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f3f5f7;
display:flex;
justify-content:center;
min-height:100vh;
}

.mobile-container{
width:100%;
max-width:430px;
margin:auto;
min-height:100vh;
background:#F7FDFF;
}

/* HEADER */

.header{
display:flex;
align-items:center;
padding:16px;
background:white;
box-shadow:0 4px 8px rgba(0,0,0,0.12);
position:relative;
}

.back{
position:absolute;
left:16px;
}

.title{
font-size:20px;
font-weight:bold;
color:#1e3a6d;
margin:auto;
}

/* BODY */

.body{
padding:20px;
padding-bottom:120px;
}

/* PROFILE CARD */

.profile-card{
background:white;
border-radius:20px;
padding:25px 20px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.profile-avatar{
width:110px;
height:110px;
margin:auto;
margin-bottom:10px;
}

.profile-name{
font-size:22px;
font-weight:bold;
color:#2c4a73;
margin-top:10px;
}

.profile-email{
color:#7a8a9a;
margin-top:5px;
}

/* STATS */

.stats{
display:flex;
background:#f3f6f8;
border-radius:14px;
padding:16px 10px;
margin-top:20px;
}

.stat{
flex:1;
text-align:center;
}

.stat:not(:last-child){
border-right:1px solid #e3e6ea;
}

.stat-title{
font-size:12px;
color:#5b6c7d;
margin-bottom:6px;
}

.stat-value{
display:flex;
align-items:center;
justify-content:center;
gap:6px;
font-size:18px;
font-weight:700;
color:#2c4a73;
}

.stat-value img{
width:18px;
height:18px;
}

.stat strong{
display:block;
font-size:22px;
color:#2c4a73;
margin-top:5px;
}

/* MENU LIST */

.menu-card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.menu-item{
display:flex;
align-items:center;
justify-content:space-between;
padding:18px;
border-bottom:1px solid #eee;
}

.menu-item:last-child{
border-bottom:none;
}

.menu-left{
display:flex;
align-items:center;
gap:14px;
font-size:17px;
color:#2c4a73;
font-weight:600;
}

.menu-left img{
width:26px;
}

.menu-arrow{
color:#9aa7b5;
font-size:20px;
}

/* LOGOUT */

.logout{
background:white;
border-radius:14px;
text-align:center;
padding:18px;
color:#d15c5c;
font-size:18px;
font-weight:600;
box-shadow:0 6px 14px rgba(0,0,0,0.08);
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
width:430px;
background:white;
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 -3px 10px rgba(0,0,0,0.08);

left:50%;
transform:translateX(-50%);
max-width:430px;
}

.bottom-nav img{
height:40px;
}

</style>
</head>

<body>

<div class="mobile-container">

<!-- HEADER -->

<div class="header">

<a href="/home.html" class="back">
<img src="img/icon/arrow-back-icon.png" width="40">
</a>

<div class="title">Profil</div>

</div>


<!-- BODY -->

<div class="body">

<!-- PROFILE CARD -->

<div class="profile-card">

<img src="img/icon/profile/poto-profil.png" class="profile-avatar">

<div class="profile-name">Danisha Aqusya</div>
<div class="profile-email">danisha@email.com</div>

<div class="stats">

  <div class="stat">
    <div class="stat-title">Laporan Dibuat</div>
    <div class="stat-value">12</div>
  </div>

  <div class="stat">
    <div class="stat-title">Laporan Valid</div>
    <div class="stat-value">
      <img src="img/icon/profile/centang-hijau.png">
      <span>9</span>
    </div>
  </div>

  <div class="stat">
    <div class="stat-title">Poin Safe-Eat</div>
    <div class="stat-value">
      <img src="img/icon/profile/bintang.png">
      <span>120</span>
    </div>
  </div>

</div>

</div>


<!-- MENU -->

<div class="menu-card">

<div class="menu-item">
<div class="menu-left">
<img src="img/icon/profile/user-profile.png">
Edit Profil
</div>
<div class="menu-arrow">›</div>
</div>

<div class="menu-item">
<div class="menu-left">
<img src="img/icon/profile/lokasi.png">
Riwayat Laporan
</div>
<div class="menu-arrow">›</div>
</div>

<div class="menu-item">
<div class="menu-left">
<img src="img/icon/profile/bintang-simpan.png">
Poin & Badge
</div>
<div class="menu-arrow">›</div>
</div>

<div class="menu-item">
<div class="menu-left">
<img src="img/icon/profile/bell.png">
Notifikasi
</div>
<div class="menu-arrow">›</div>
</div>

<div class="menu-item">
<div class="menu-left">
<img src="img/icon/profile/tanda-tanya.png">
Bantuan
</div>
<div class="menu-arrow">›</div>
</div>

<div class="menu-item">
<div class="menu-left">
<img src="img/icon/profile/gerigi.png">
Pengaturan
</div>
<div class="menu-arrow">›</div>
</div>

</div>


<!-- LOGOUT -->

<div class="logout">
Keluar Akun
</div>

</div>


<!-- BOTTOM NAV -->

<div class="bottom-nav">

<a href="/home.html">
<img src="img/button/home-button.png">
</a>

<a href="/peta.html">
<img src="img/button/peta-button.png">
</a>

<a href="/lapor.html">
<img src="img/button/lapor-button.png">
</a>

<a href="/profile.html">
<img src="img/button/profil-button.png">
</a>

</div>

</div>

</body>
</html>
