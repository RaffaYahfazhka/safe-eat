<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo.png">
<title>Peta - Safe-eat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

.body{
position:relative;
}

.mobile-container{
width:100%;
max-width:430px;
margin:auto;
min-height:100vh;
background:#F7FDFF;
}

.map-container{
position:relative;
margin-left:-20px;
margin-right:-20px;
}

.bg-home{
width:100%;
display:block;
}

.filter-btn{
position:absolute;
top:10px;
right:16px;

background:white;
padding:10px 16px;
border-radius:12px;

font-weight:700;
font-size:16px;
color:#1e3a6d;

box-shadow:0 6px 12px rgba(0,0,0,0.15);
}

/* HEADER */

.header{
display:flex;
align-items:center;
padding:16px;
background:white;
box-shadow:0 4px 8px rgba(0,0,0,0.12);
}

.back{
font-size:26px;
margin-right:12px;
cursor:pointer;
}

.title{
  font-size:20px;
  font-weight:bold;
  color:#1e3a6d;
  margin:auto;
  margin-left:40px;
  margin-bottom: 12px;
  text-align: center;
}

/* BODY */

.body{
padding:20px;
padding-bottom:120px;
}

/* INPUT BOX */

.input-box{
width:100%;
border:none;
outline:none;
background:white;
padding:18px;
border-radius:12px;
margin-bottom:20px;
font-size:16px;
font-weight:600;
color:#1e3a6d;
box-shadow:0 6px 12px rgba(0,0,0,0.08);
}

.textarea{
min-height:80px;
resize:none;
}

.upload-left{
display:flex;
align-items:center;
gap:10px;
}

.upload-box{
display:flex;
align-items:center;
justify-content:space-between;
background:white;
padding:18px;
border-radius:12px;
box-shadow:0 6px 12px rgba(0,0,0,0.08);
margin-bottom:10px;
cursor:pointer;
}

/* LOCATION SECTION */

.location-box{
display:flex;
align-items:center;
gap:20px;
margin:30px 0;
}

.location-box img{
width:110px;
}

.location-btn{
background:#8fb647;
color:white;
padding:14px 22px;
border-radius:10px;
font-weight:bold;
font-size:16px;
white-space:nowrap;
}

/* UPLOAD */

.upload-box{
display:flex;
align-items:center;
justify-content:space-between;
background:white;
padding:18px;
border-radius:12px;
box-shadow:0 6px 12px rgba(0,0,0,0.08);
margin-bottom:10px;
font-weight:bold;
color:#1e3a6d;
}

.upload-icon{
font-size:22px;
}

/* INFO TEXT */

.info{
font-size:12px;
color:#777;
line-height:1.4;
margin-bottom:30px;
margin-top: 20px;
}

/* BUTTON */

.submit-btn{
background:#8fb647;
color:white;
font-size:26px;
text-align:center;
padding:16px;
border-radius:14px;
font-weight:bold;
}

.bottom-nav{
position:fixed;
bottom:0;
width:430px;
background:white;
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 -3px 10px rgba(0,0,0,0.08);

left:50%;
transform:translateX(-50%);
max-width:430px;
}

.bottom-nav img{
height:40px;
}

</style>
</head>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const fotoInput = document.getElementById("fotoInput");
  const preview = document.getElementById("previewFoto");
  const fotoText = document.getElementById("fotoText");

  fotoInput.addEventListener("change", function(){

    const file = this.files[0];

    if(file){
      // tampilkan preview
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";

      // ubah teks jadi nama file
      fotoText.textContent = file.name;
    }

  });

});
</script>

<body>

<div class="mobile-container">

<!-- HEADER -->

<div class="header">

<a href="/home.html" class="back">
  <img src="img/icon/arrow-back-icon.png" alt="icon back" width="40px">
</a>

<div class="title">Peta Keamanan Pangan</div>

</div>


<!-- BODY -->

<div class="body">

 <div class="map-container">
  <div class="filter-btn">
    24 jam Terakhir
  </div>

  <br><br><br><br>

  <img src="img/home/bg-maps.png" class="bg-home">
</div>

</div>


<!-- BOTTOM NAV (TIDAK DIUBAHs) -->

<div class="bottom-nav">

<a href="/home.html">
<img src="img/button/home-button.png">
</a>

<a href="/peta.html">
<img src="img/button/peta-button.png">
</a>

<a href="/lapor.html">
<img src="img/button/lapor-button.png">
</a>

<a href="/profile.html">
  <img src="img/button/profil-button.png">
</a>

</div>

</div>

</body>
</html>
